<head>
    <meta charset="UTF-8">
    <title>MyConservationist | Signup</title>
    <style>
        body {
            background-color: #d5e1ef;
            background-image: url('https://www.transparenttextures.com');
            font-family: Verdana, Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .main-wrapper {
            width: 500px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d5e1ef;
            padding: 30px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .top-nav {
            background: #336633;
            color: #fff;
            padding: 6px;
            text-align: center;
            font-size: 11px;
            margin-bottom: 20px;
        }
        .top-nav a { color: #6699cc; text-decoration: none; margin: 0 8px; font-weight: bold; }

        .signup-title {
            font-size: 24px;
            font-weight: bold;
            color: #336633;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            font-size: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border: 1px solid #6699cc;
            background-color: #f9f9f9;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background-color: #336633;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .signup-btn:hover {
            background-color: #2d5a2d;
        }

        .error-message {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #388e3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
            text-align: center;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }

        .login-link a {
            color: #6699cc;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-nav">
        <a href="index.html">Home</a> | 
        <a href="browse.html">Browse</a> | 
        <a href="search.html">Search</a> | 
        <a href="signup.html" style="color: #ffcc80;">Sign Up</a> | 
        <a href="login.html">Login</a> | 
        <a href="layouts.html">Layouts</a>
    </div>

    <div class="signup-title">Join MyConservationist</div>

    <form id="signupForm">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required placeholder="Choose your username">
            <div class="error-message" id="usernameError"></div>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
            <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
            <div class="error-message" id="passwordError"></div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" placeholder="Confirm your password">
            <div class="error-message" id="confirmPasswordError"></div>
        </div>

        <button type="submit" class="signup-btn">Sign Up</button>
        <div class="success-message" id="successMessage">Account created successfully! Check your email.</div>
    </form>

    <div class="login-link">
        Already have an account? <a href="login.html">Log in here</a>
    </div>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Reset error messages
        document.getElementById('usernameError').style.display = 'none';
        document.getElementById('emailError').style.display = 'none';
        document.getElementById('passwordError').style.display = 'none';
        document.getElementById('confirmPasswordError').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';

        let hasError = false;

        // Validation
        if (username.length < 3) {
            document.getElementById('usernameError').textContent = 'Username must be at least 3 characters';
            document.getElementById('usernameError').style.display = 'block';
            hasError = true;
        }

        if (password.length < 8) {
            document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
            document.getElementById('passwordError').style.display = 'block';
            hasError = true;
        }

        if (password !== confirmPassword) {
            document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
            document.getElementById('confirmPasswordError').style.display = 'block';
            hasError = true;
        }

        if (hasError) return;

        try {
            // Send welcome email via Brevo
            await sendBrevoEmail(email, username);
            
            // Show success message
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('signupForm').reset();
            
            // Save user data to localStorage temporarily
            localStorage.setItem('newUser', JSON.stringify({ username, email }));
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred. Please try again.');
        }
    });

    async function sendBrevoEmail(email, username) {
        const BREVO_API_KEY = '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'; // Replace with your actual API key
        
        const response = await fetch('https://api.brevo.com/v3/smtp/email', {
            method: 'POST',
            headers: {
                'api-key': BREVO_API_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                to: [{ email: email, name: username }],
                sender: { email: 'noreply@myconservationist.com', name: 'MyConservationist' },
                subject: 'Welcome to MyConservationist!',
                htmlContent: `
                    <h2>Welcome to MyConservationist, ${username}!</h2>
                    <p>Thank you for joining our conservation community.</p>
                    <p>Start by completing your profile and connecting with other conservationists.</p>
                    <p><a href="https://myconservationist.com">Visit MyConservationist</a></p>
                    <p>Happy conserving!</p>
                `
            })
        });

        if (!response.ok) {
            throw new Error('Failed to send email');
        }
    }
</script>

</body>
</html>
