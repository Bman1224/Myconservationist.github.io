<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyConservationist | Login</title>
    <script src="auth.js"></script>
    <style>
        body { background-color: #ccd9f0; font-family: Verdana, Arial, Helvetica, sans-serif; margin: 0; padding: 40px 20px; }
        .top-nav { background: #1a3a6b; color: #fff; padding: 6px; text-align: center; font-size: 11px; margin-bottom: 30px; max-width: 420px; margin-left: auto; margin-right: auto; }
        .top-nav a { color: #add4ff; text-decoration: none; margin: 0 8px; font-weight: bold; }

        .login-box {
            width: 100%; max-width: 420px;
            margin: 0 auto;
            background: #eef3fb;
            border: 1px solid #a0b8e0;
            box-shadow: 2px 2px 8px rgba(0,0,100,0.12);
        }
        .login-head {
            background: #2a5da8; color: #fff;
            padding: 10px 14px; font-weight: bold; font-size: 15px;
        }
        .login-body { padding: 20px; }

        label { display: block; font-size: 11px; font-weight: bold; color: #1a3a6b; margin-bottom: 4px; }
        input[type=email], input[type=password] {
            width: 100%; padding: 8px 10px; border: 1px solid #4a7fc1;
            font-size: 13px; background: #fff; box-sizing: border-box; margin-bottom: 14px;
        }
        input:focus { outline: 2px solid #2a5da8; }

        .btn {
            width: 100%; padding: 10px; background: #2a5da8; color: #fff;
            border: none; font-size: 13px; font-weight: bold; cursor: pointer;
        }
        .btn:hover { background: #1a3a6b; }
        .btn:disabled { background: #7aaade; cursor: not-allowed; }

        .divider { text-align: center; font-size: 11px; color: #888; margin: 14px 0; }

        .msg {
            padding: 8px 10px; font-size: 12px; margin-bottom: 12px;
            display: none; border-radius: 2px;
        }
        .msg.error { background: #fdecea; border: 1px solid #e57373; color: #b71c1c; display: block; }
        .msg.success { background: #e8f5e9; border: 1px solid #81c784; color: #1b5e20; display: block; }
        .msg.info { background: #ddeeff; border: 1px solid #4a7fc1; color: #1a3a6b; display: block; }

        .footer-links { text-align: center; font-size: 11px; margin-top: 14px; color: #555; }
        .footer-links a { color: #2a5da8; text-decoration: none; font-weight: bold; }
        .footer-links a:hover { text-decoration: underline; }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { font-size: 10px; margin-top: 24px; color: #4a7fc1; text-align: center; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="index.html">Home</a> |
    <a href="browse.html">Browse</a> |
    <a href="signup.html">Sign Up</a>
</div>

<div class="login-box">
    <div class="login-head">🌿 Log In to MyConservationist</div>
    <div class="login-body">

        <div class="msg" id="msgBox"></div>

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

        <button class="btn" id="loginBtn" onclick="doLogin()">Log In</button>

        <div class="divider">— or —</div>

        <div class="footer-links">
            Don't have an account? <a href="signup.html">Sign Up</a><br><br>
            <a href="forgot.html">Forgot your password?</a>
        </div>
    </div>
</div>

<footer>MyConservationist ©2026 | Built by Boss</footer>

<script>
// If already logged in, send straight to homepage
onSupabaseReady(async () => {
    const user = await getUser();
    if (user) window.location.href = "index.html";
});

async function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");
    const msg      = document.getElementById("msgBox");

    // Basic validation
    if (!email || !password) {
        showMsg("Please fill in both fields.", "error"); return;
    }

    // Loading state
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Logging in…';
    msg.className = "msg";

    onSupabaseReady(async () => {
        const { data, error } = await signIn(email, password);

        if (error) {
            if (error.message.includes("Email not confirmed")) {
                showMsg("⚠️ Please check your email and click the confirmation link before logging in.", "info");
            } else if (error.message.includes("Invalid login")) {
                showMsg("Incorrect email or password. Try again.", "error");
            } else {
                showMsg(error.message, "error");
            }
            btn.disabled = false;
            btn.textContent = "Log In";
            return;
        }

        showMsg("✅ Logged in! Redirecting…", "success");
        setTimeout(() => window.location.href = "index.html", 800);
    });
}

function showMsg(text, type) {
    const el = document.getElementById("msgBox");
    el.textContent = text;
    el.className = "msg " + type;
}

// Allow Enter key to submit
document.addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
