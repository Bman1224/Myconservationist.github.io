<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyConservationist | Layouts</title>
    <style>
        body {
            background-color: #d5e1ef;
            background-image: url('https://www.transparenttextures.com');
            font-family: Verdana, Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .main-wrapper {
            width: 900px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d5e1ef;
            padding: 15px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .top-nav {
            background: #336633;
            color: #fff;
            padding: 6px;
            text-align: center;
            font-size: 11px;
            margin-bottom: 20px;
        }
        .top-nav a { color: #6699cc; text-decoration: none; margin: 0 8px; font-weight: bold; }

        .layouts-title {
            font-size: 24px;
            font-weight: bold;
            color: #336633;
            text-align: center;
            margin-bottom: 10px;
        }

        .layouts-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 12px;
        }

        .layouts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .layout-card {
            border: 2px solid #6699cc;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .layout-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .layout-preview {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
        }

        .layout-preview.classic { background: linear-gradient(135deg, #336633 0%, #6699cc 100%); }
        .layout-preview.ocean { background: linear-gradient(135deg, #00a8e8 0%, #005082 100%); }
        .layout-preview.forest { background: linear-gradient(135deg, #2d5016 0%, #6fbc39 100%); }
        .layout-preview.sunset { background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%); }
        .layout-preview.night { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .layout-preview.earth { background: linear-gradient(135deg, #8b6f47 0%, #d4a574 100%); }

        .layout-info {
            padding: 15px;
            background: #fff;
        }

        .layout-name {
            font-weight: bold;
            color: #336633;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .layout-desc {
            font-size: 11px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .layout-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
        }

        .btn-preview {
            background-color: #6699cc;
            color: #fff;
        }

        .btn-preview:hover {
            background-color: #5578aa;
        }

        .btn-select {
            background-color: #336633;
            color: #fff;
        }

        .btn-select:hover {
            background-color: #2d5a2d;
        }

        .layout-editor {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 20px;
            margin-top: 30px;
            border-radius: 8px;
        }

        .editor-title {
            font-size: 18px;
            font-weight: bold;
            color: #336633;
            margin-bottom: 20px;
        }

        .editor-section {
            margin-bottom: 20px;
        }

        .editor-label {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            display: block;
            font-size: 12px;
        }

        .editor-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 12px;
        }

        .color-picker-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border: 3px solid #000;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-save, .btn-cancel {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .btn-save {
            background-color: #336633;
            color: #fff;
        }

        .btn-save:hover {
            background-color: #2d5a2d;
        }

        .btn-cancel {
            background-color: #ccc;
            color: #333;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-nav">
        <a href="index.html">Home</a> | 
        <a href="browse.html">Browse</a> | 
        <a href="search.html">Search</a> | 
        <a href="signup.html">Sign Up</a> | 
        <a href="login.html">Login</a> | 
        <a href="layouts.html" style="color: #ffcc80;">Layouts</a>
    </div>

    <div class="layouts-title">Profile Layouts</div>
    <div class="layouts-subtitle">Choose a layout template for your profile or create your own custom design</div>

    <div class="layouts-grid" id="layoutsGrid"></div>

    <!-- Custom Layout Editor -->
    <div class="layout-editor">
        <div class="editor-title">Create Custom Layout</div>
        
        <div class="editor-section">
            <label class="editor-label">Layout Name:</label>
            <input type="text" class="editor-input" id="customName" placeholder="My Custom Layout">
        </div>

        <div class="editor-section">
            <label class="editor-label">Background Color:</label>
            <div class="color-picker-row" id="bgColorPicker"></div>
        </div>

        <div class="editor-section">
            <label class="editor-label">Header Color:</label>
            <div class="color-picker-row" id="headerColorPicker"></div>
        </div>

        <div class="editor-section">
            <label class="editor-label">Text Color:</label>
            <div class="color-picker-row" id="textColorPicker"></div>
        </div>

        <div class="editor-actions">
            <button class="btn-save" onclick="saveCustomLayout()">Save Custom Layout</button>
            <button class="btn-cancel" onclick="resetEditor()">Reset</button>
        </div>
    </div>
</div>

<script>
    const predefinedLayouts = [
        { id: 'classic', name: 'Classic MyConservationist', description: 'The original green and blue theme.', previewClass: 'classic' },
        { id: 'ocean', name: 'Ocean Blue', description: 'Cool ocean vibes. Great for water conservation.', previewClass: 'ocean' },
        { id: 'forest', name: 'Forest Green', description: 'Deep forest colors. Perfect for woodland lovers.', previewClass: 'forest' },
        { id: 'sunset', name: 'Sunset', description: 'Warm sunset colors. Bring warmth to your profile.', previewClass: 'sunset' },
        { id: 'night', name: 'Night Sky', description: 'Dark theme with deep blues. Easy on the eyes.', previewClass: 'night' },
        { id: 'earth', name: 'Earth Tones', description: 'Natural earth colors. Grounded and comfortable.', previewClass: 'earth' }
    ];

    const colors = ['#ffffff', '#000000', '#336633', '#6699cc', '#ff6600', '#ffcc80', '#d5e1ef', '#e0f7ff', '#e8f4d8', '#fff5e6', '#ff6b6b', '#4a90e2'];

    function initializeLayouts() {
        const grid = document.getElementById('layoutsGrid');
        predefinedLayouts.forEach(layout => {
            const card = document.createElement('div');
            card.className = 'layout-card';
            card.innerHTML = `
                <div class="layout-preview ${layout.previewClass}"><span>${layout.name}</span></div>
                <div class="layout-info">
                    <div class="layout-name">${layout.name}</div>
                    <div class="layout-desc">${layout.description}</div>
                    <div class="layout-actions">
                        <button class="btn btn-preview" onclick="selectLayout('${layout.id}')">Select</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function initializeColorPickers() {
        ['bgColorPicker', 'headerColorPicker', 'textColorPicker'].forEach(pickerId => {
            const picker = document.getElementById(pickerId);
            colors.forEach(color => {
                const option = document.createElement('div');
                option.className = 'color-option';
                option.style.backgroundColor = color;
                option.onclick = () => selectColor(option, pickerId);
                picker.appendChild(option);
            });
        });
    }

    function selectColor(element, pickerId) {
        const picker = document.getElementById(pickerId);
        picker.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
    }

    function selectLayout(layoutId) {
        localStorage.setItem('selectedLayout', layoutId);
        alert('Layout selected! Your profile will use this theme.');
    }

    function saveCustomLayout() {
        const name = document.getElementById('customName').value.trim();
        if (!name) {
            alert('Please enter a layout name');
            return;
        }
        alert('Custom layout saved!');
        resetEditor();
    }

    function resetEditor() {
        document.getElementById('customName').value = '';
        document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
    }

    window.addEventListener('load', function() {
        initializeLayouts();
        initializeColorPickers();
    });
</script>

</body>
</html>
