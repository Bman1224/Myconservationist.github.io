<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Layout Templates</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .template {
            margin: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .template img {
            max-width: 100%;
            height: auto;
        }
        .template-description {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Gallery of Profile Layout Templates</h1>
    <div class="gallery">
        <div class="template">
            <img src="template1.jpg" alt="Template 1">
            <div class="template-description">
                <h2>Template 1</h2>
                <p>This is a description of the first profile layout template.</p>
            </div>
        </div>
        <div class="template">
            <img src="template2.jpg" alt="Template 2">
            <div class="template-description">
                <h2>Template 2</h2>
                <p>This is a description of the second profile layout template.</p>
            </div>
        </div>
        <div class="template">
            <img src="template3.jpg" alt="Template 3">
            <div class="template-description">
                <h2>Template 3</h2>
                <p>This is a description of the third profile layout template.</p>
            </div>
        </div>
    </div>
</body>
</html>
